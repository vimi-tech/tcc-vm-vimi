<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeiraScore - FAQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Russo One', sans-serif; }
    body { background-color: #0d0b0b; color: white; }
    .navbar-custom { background-color: #0d0b0b; padding: 15px 0; }
    .btn-nav-red { width: 110px; height: 40px; border: none; border-radius: 20px; background-color: #b61c1c; color: white; display: flex; justify-content: center; align-items: center; text-decoration: none; }
    .btn-nav-custom-red { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: #ffffff !important; background-color: #b61c1c; padding: 8px 18px; font-size: 14px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    .accordion-item-custom { background: rgba(255, 255, 255, 0.06) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; border-radius: 15px !important; margin-bottom: 15px; overflow: hidden; }
    .accordion-button-custom { background: transparent !important; color: white !important; padding: 20px; box-shadow: none !important; }
    .accordion-button-custom:not(.collapsed) { color: #ff4d4d !important; background: rgba(255, 255, 255, 0.03) !important; }
    .accordion-button-custom::after { filter: invert(1); }
    .accordion-body-custom { background: rgba(0, 0, 0, 0.2); color: #ccc; font-family: sans-serif; font-size: 14px; }
    .footer-custom { background-color: #050505; padding: 40px 0; text-center; }
  </style>
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="btn-nav-red" href="{{ url_for('login') }}">Votar</a>
        <div class="collapse navbar-collapse justify-content-center">
          <div class="d-flex flex-wrap gap-2 justify-content-center">
            <a class="btn-nav-custom-red" href="{{ url_for('index') }}">Início</a>
            <a class="btn-nav-custom-red" href="{{ url_for('estandes') }}">Estandes</a>
            <a class="btn-nav-custom-red" href="{{ url_for('noticias') }}">Notícias</a>
            <a class="btn-nav-custom-red" href="{{ url_for('localizacao') }}">Localização</a>
            <a class="btn-nav-custom-red" href="{{ url_for('faq') }}">FAQ</a>
            <a class="btn-nav-custom-red" href="{{ url_for('estudantelogin') }}">Buscar por Turma</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="container my-5 py-4">
    <h2 class="text-center mb-5" style="color: #b61c1c; text-transform: uppercase;">Perguntas Frequentes</h2>
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="accordion" id="accordionFAQ">
          <div class="accordion-item accordion-item-custom">
            <h2 class="accordion-header">
              <button class="accordion-button accordion-button-custom collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">Como posso registrar meu voto?</button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFAQ">
              <div class="accordion-body accordion-body-custom">Basta clicar no botão "Votar" localizado na barra superior ou nos cards dos estandes.</div>
            </div>
          </div>
          <div class="accordion-item accordion-item-custom">
            <h2 class="accordion-header">
              <button class="accordion-button accordion-button-custom collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">Posso votar em mais de um projeto?</button>
            </h2>
            <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionFAQ">
              <div class="accordion-body accordion-body-custom">Sim, você pode pontuar estandes diferentes, mas apenas um único voto é permitido por projeto.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-custom text-center">
    <div class="container"><p class="mb-0"><a href="mailto:contato@feirascore.com">contato@feirascore.com</a></p></div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
