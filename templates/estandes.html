<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeiraScore - Estandes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Russo One', sans-serif; }
    body { background-color: #ededed; }
    .navbar-custom { background-color: #ededed; padding: 15px 0; }
    .btn-nav-red { width: 110px; height: 40px; border: none; border-radius: 20px; background-color: #b61c1c; color: white; font-size: 16px; text-transform: uppercase; text-decoration: none; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
    .btn-nav-custom-red { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: #ffffff !important; background-color: #b61c1c; padding: 8px 18px; font-size: 14px; font-weight: bold; text-transform: uppercase; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; border: none; white-space: nowrap; }
    .btn-nav-custom-red:hover { background-color: #8a1212; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); }
    .brand-logos-container { display: flex; align-items: center; gap: 12px; }
    .img-navbar-logo { object-fit: contain; border-radius: 6px; }
    .estandes-section { padding: 60px 0; }
    .section-title-dark { text-align: center; color: #b61c1c; font-size: 2.5rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 40px; }
    .category-btn { background-color: #fff; color: #333; border: 2px solid #b61c1c; border-radius: 20px; padding: 8px 20px; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
    .category-btn.active, .category-btn:hover { background-color: #b61c1c; color: #fff; }
    .estande-card { background: #fff; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid #b61c1c; transition: transform 0.2s; }
    .estande-card:hover { transform: translateY(-5px); }
    .estande-badge { font-size: 12px; background-color: #333; color: #fff; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; }
    .pagination-custom .page-link { color: #b61c1c; border: 1px solid #dee2e6; }
    .pagination-custom .page-item.active .page-link { background-color: #b61c1c; border-color: #b61c1c; color: #fff; }
    .footer-custom { background-color: #050505; color: rgba(255,255,255,0.6); padding: 40px 0; font-size: 14px; }
    .footer-custom a { color: #ff4d4d; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="btn-nav-red" href="{{ url_for('login') }}">Votar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
          <div class="d-flex flex-wrap gap-2 justify-content-center my-3 my-lg-0">
            <a class="btn-nav-custom-red" href="{{ url_for('index') }}">Início</a>
            <a class="btn-nav-custom-red" href="{{ url_for('estandes') }}">Estandes</a>
            <a class="btn-nav-custom-red" href="{{ url_for('noticias') }}">Notícias</a>
            <a class="btn-nav-custom-red" href="{{ url_for('localizacao') }}">Localização</a>
            <a class="btn-nav-custom-red" href="{{ url_for('faq') }}">FAQ</a>
            <a class="btn-nav-custom-red" href="{{ url_for('estudantelogin') }}">Buscar por Turma</a>
          </div>
        </div>
        <div class="brand-logos-container ms-auto ms-lg-0">
          <img src="{{ url_for('static', filename='logo_feira.jpg') }}" alt="FeiraScore" class="img-navbar-logo" width="65" height="45">
          <img src="{{ url_for('static', filename='vini_logo.jpg') }}" alt="Vimi" class="img-navbar-logo" width="45" height="45">
        </div>
      </div>
    </nav>
  </header>

  <main class="container estandes-section">
    <h2 class="section-title-dark">Estandes do Evento</h2>
    <div class="d-flex flex-wrap justify-content-center gap-2 mb-4 mb-md-5">
      <button class="category-btn active" onclick="filterCategory('todos')">Todos</button>
      <button class="category-btn" onclick="filterCategory('informatica')">Informática</button>
      <button class="category-btn" onclick="filterCategory('mecanica')">Mecânica</button>
      <button class="category-btn" onclick="filterCategory('eletro')">Eletrotécnica</button>
    </div>
    <div class="row g-4" id="estandes-container"></div>
    <div class="d-flex justify-content-center mt-4 mt-md-5">
      <nav><ul class="pagination pagination-custom" id="pagination-container"></ul></nav>
    </div>
  </main>

  <footer class="footer-custom text-center">
    <div class="container"><p class="mb-0"><a href="mailto:contato@feirascore.com">contato@feirascore.com</a></p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const todosEstandes = [
      { id: 1, nome: "Estande Alpha - IA na Saúde", categoria: "informatica", descricao: "Uso de redes neurais para diagnósticos médicos preliminares." },
      { id: 2, nome: "Estande Beta - Automação Residencial", categoria: "eletro", descricao: "Controlando sua casa por comandos de voz e sensores IoT." },
      { id: 3, nome: "Estande Gamma - EcoMecânica", categoria: "mecanica", descricao: "Protótipo de motor movido a biocombustíveis eficientes." },
      { id: 4, nome: "Estande Delta - CyberSegurança", categoria: "informatica", descricao: "Simulações de invasões e como proteger seus dados online." },
      { id: 5, nome: "Estande Epsilon - Energia Solar", categoria: "eletro", descricao: "Painéis solares inteligentes auto-ajustáveis." },
      { id: 6, nome: "Estande Zeta - Braço Robótico", categoria: "mecanica", descricao: "Automação industrial utilizando braços mecânicos de alta precisão." },
      { id: 7, nome: "Estande Eta - App de Votação", categoria: "informatica", descricao: "Por trás dos panos do próprio FeiraScore." }
    ];
    let categoriaAtual = 'todos'; let paginaAtual = 1; const itensPorPagina = 3;
    function renderEstandes() {
      const container = document.getElementById('estandes-container'); container.innerHTML = '';
      const estandesFiltrados = todosEstandes.filter(e => categoriaAtual === 'todos' || e.categoria === categoriaAtual);
      const totalPaginas = Math.ceil(estandesFiltrados.length / itensPorPagina);
      if (paginaAtual > totalPaginas && totalPaginas > 0) paginaAtual = totalPaginas;
      const itensExibidos = estandesFiltrados.slice((paginaAtual - 1) * itensPorPagina, paginaAtual * itensPorPagina);
      if(itensExibidos.length === 0) { container.innerHTML = '<p class="text-center text-muted">Nenhum estande encontrado.</p>'; renderPagination(0); return; }
      itensExibidos.forEach(estande => {
        const div = document.createElement('div'); div.className = 'col-sm-6 col-md-4';
        div.innerHTML = `<div class="estande-card h-100 d-flex flex-column justify-content-between"><div><span class="estande-badge">${estande.categoria}</span><h4 class="mt-2 mb-3" style="font-size: 1.1rem; color: #b61c1c;">${estande.nome}</h4><p style="font-family: sans-serif; font-size: 14px; color: #555;">${estande.descricao}</p></div><a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-danger mt-3 w-100 rounded-pill">VOTAR NESTE</a></div>`;
        container.appendChild(div);
      });
      renderPagination(totalPaginas);
    }
    function renderPagination(t) {
      const c = document.getElementById('pagination-container'); c.innerHTML = ''; if (t <= 1) return;
      c.innerHTML += `<li class="page-item ${paginaAtual===1?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina(${paginaAtual-1})">Anterior</a></li>`;
      for(let i=1;i<=t;i++) c.innerHTML += `<li class="page-item ${paginaAtual===i?'active':''}"><a class="page-link" href="#" onclick="mudarPagina(${i})">${i}</a></li>`;
      c.innerHTML += `<li class="page-item ${paginaAtual===t?'disabled':''}"><a class="page-link" href="#" onclick="mudarPagina(${paginaAtual+1})">Próximo</a></li>`;
    }
    function mudarPagina(p) { paginaAtual = p; renderEstandes(); }
    function filterCategory(c) { categoriaAtual = c; paginaAtual = 1; const botoes = document.querySelectorAll('.category-btn'); botoes.forEach(b => b.classList.remove('active')); if(window.event) window.event.target.classList.add('active'); renderEstandes(); }
    document.addEventListener("DOMContentLoaded", renderEstandes);
  </script>
</body>
</html>
