<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localização - FeiraScore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .location-section { padding: 60px 0; background-color: #f9f9f9; }
    .map-responsive { overflow: hidden; padding-bottom: 450px; position: relative; height: 0; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .map-responsive iframe { left: 0; top: 0; height: 100%; width: 100%; position: absolute; }
  </style>
</head>
<body>

  <section class="location-section" id="localizacao">
    <div class="container">
      <h2 class="text-center mb-2 text-uppercase" style="color: #b61c1c;">Onde Estamos</h2>
      <p class="text-center mb-4 text-muted">Venha visitar os estandes na Etec Sylvio de Mattos Carvalho em Matão-SP</p>
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="map-responsive">
            <iframe src="https://maps.google.com/maps?q=Etec%20Sylvio%20de%20Mattos%20Carvalho,%20Mat%C3%A3o&t=&z=15&ie=UTF8&iwloc=&output=embed" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
