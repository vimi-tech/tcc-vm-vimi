<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeiraScore - Login Estudante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      /* Degradê de vermelho escuro para um tom mais aberto, simulando a imagem */
      background: linear-gradient(135deg, #3d0000 0%, #800000 50%, #b61c1c 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Linhas de ondas no fundo (Simulação do background-login.jpg) */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1px, transparent 1px),
                        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotate(15deg);
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      text-align: center;
      z-index: 1;
    }

    /* Estilização do grupo de avatares (SVG customizado igual à imagem) */
    .avatar-group {
      width: 180px;
      height: auto;
      margin: 0 auto 15px auto;
      filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.3));
    }

    .welcome-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 300;
      margin-bottom: 30px;
    }

    /* Customização das caixas de texto (Inputs brancos arredondados) */
    .input-group-custom {
      background-color: #ffffff;
      border-radius: 4px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      padding: 5px 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .input-group-custom i {
      color: #333;
      font-size: 18px;
      margin-right: 12px;
    }

    .input-group-custom input {
      border: none;
      background: transparent;
      width: 100%;
      padding: 10px 0;
      font-size: 14px;
      color: #333;
      outline: none;
    }

    .input-group-custom input::placeholder {
      color: #aaa;
    }

    /* Botão Entrar Preto Arredondado */
    .btn-entrar {
      background-color: #000000;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 40px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      margin-top: 15px;
      transition: background-color 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .btn-entrar:hover {
      background-color: #1a1a1a;
      transform: scale(1.03);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <svg class="avatar-group" viewBox="0 0 100 45" fill="#3c3c3c" stroke="#ffffff" stroke-width="1.5">
      <circle cx="20" cy="22" r="7"/>
      <path d="M10,40 C10,30 30,30 30,40"/>
      
      <circle cx="80" cy="22" r="7"/>
      <path d="M70,40 C70,30 90,30 90,40"/>

      <circle cx="35" cy="18" r="8"/>
      <path d="M22,40 C22,28 48,28 48,40"/>

      <circle cx="65" cy="18" r="8"/>
      <path d="M52,40 C52,28 78,28 78,40"/>

      <circle cx="50" cy="14" r="9" fill="#3c3c3c"/>
      <path d="M35,40 C35,24 65,24 65,40" fill="#3c3c3c"/>
    </svg>

    <p class="welcome-text">Seja bem-vindo de volta!</p>

    <form action="#" method="POST">
      
      <div class="input-group-custom">
        <i class="bi bi-person"></i>
        <input type="text" name="username" placeholder="charlixcxgod" required autocomplete="off">
      </div>

      <div class="input-group-custom">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="**********" required>
      </div>

      <button type="submit" class="btn btn-entrar">Entrar</button>
    </form>

  </div>

</body>
</html>
