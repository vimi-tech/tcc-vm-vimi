<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeiraScore - Login Estudante</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estudante.css') }}">
</head>
<body>

  <div class="login-container">

    <svg class="avatar-group" viewBox="0 0 100 45" fill="#3c3c3c" stroke="#ffffff" stroke-width="1.4">
      <circle cx="20" cy="22" r="7"/>
      <path d="M10,40 C10,30 30,30 30,40"/>

      <circle cx="80" cy="22" r="7"/>
      <path d="M70,40 C70,30 90,30 90,40"/>

      <circle cx="35" cy="18" r="8"/>
      <path d="M22,40 C22,28 48,28 48,40"/>

      <circle cx="65" cy="18" r="8"/>
      <path d="M52,40 C52,28 78,28 78,40"/>

      <circle cx="50" cy="14" r="9" fill="#3c3c3c"/>
      <path d="M35,40 C35,24 65,24 65,40" fill="#3c3c3c"/>
    </svg>

    <p class="welcome-text">Seja bem-vindo de volta!</p>

    <form action="#" method="POST">

      <div class="input-group-custom">
        <i class="bi bi-person"></i>
        <input type="text" name="username" placeholder="charlixcxgod" required autocomplete="off">
      </div>

      <div class="input-group-custom">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="**********" required>
      </div>

      <button type="submit" class="btn btn-entrar">Entrar</button>

    </form>

  </div>

</body>
</html>
