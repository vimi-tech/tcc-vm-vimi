<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FeiraScore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Russo One', sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #3c0000; 
      background-image: url("/static/fundo.png"); 

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CARD LOGIN (Estilo Glassmorphism para a tela de Votar) */
    .login-card {
      width: 450px;
      padding: 40px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    /* ESTILO DA TELA DO ESTUDANTE (Sem o card ao redor) */
    .login-container-estudante {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      text-align: center;
    }

    .img-pessoas {
      width: 100%;
      max-width: 340px;
      height: auto;
      margin-bottom: 15px;
    }

    .welcome-text {
      color: #ffffff;
      font-size: 14px;
      font-family: sans-serif;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    /* LABELS E TEXTOS */
    .login-title {
      color: white;
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      text-transform: uppercase;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .custom-label {
      color: white;
      font-size: 14px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nome-label {
      text-transform: lowercase;
    }

    .confirmar-text {
      color: white;
      text-align: right;
      font-size: 11px;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* INPUTS GERAIS */
    .form-control {
      height: 48px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.90);
      font-size: 15px;
      padding-left: 15px;
      color: #333;
    }

    /* INPUTS COM ÍCONE (Estudante) */
    .input-group-custom {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group-custom i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #333333;
      font-size: 20px;
      z-index: 5;
    }

    .form-control-custom {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.90);
      font-size: 15px;
      padding-left: 50px;
      color: #333;
    }

    /* BOTÕES */
    .btn-votar {
      width: 120px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to bottom, #e6e6e6, #ffffff);
      color: #5a0000;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s ease-in-out;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn-entrar {
      width: 130px;
      height: 46px;
      border: none;
      border-radius: 8px;
      background-color: #000000;
      color: #ffffff;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s;
    }

    .btn-votar:hover, .btn-entrar:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  {% if tipo_tela == 'estudante' %}
  <div class="login-container-estudante">
    <img src="/static/pessoas.jpeg" alt="Estudantes" class="img-pessoas">
    <p class="welcome-text">Seja bem-vindo de volta!</p>

    <form>
      <div class="input-group-custom">
        <i class="bi bi-person"></i>
        <input type="text" class="form-control-custom" placeholder="charlixcxgod" required>
      </div>

      <div class="input-group-custom">
        <i class="bi bi-lock"></i>
        <input type="password" class="form-control-custom" placeholder="**********" required>
      </div>

      <button type="submit" class="btn-entrar">ENTRAR</button>
    </form>
  </div>

  {% else %}
  <div class="login-card">
    <h1 class="login-title">Para votar, é necessário que você insira seu número de telefone</h1>

    <form>
      <div class="mb-4">
        <input type="tel" class="form-control" placeholder="(16) XXXXX-XXXX">
        <div class="confirmar-text">Confirmar Número</div>
      </div>

      <div class="mb-4">
        <label class="custom-label">Código de Confirmação</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-4">
        <label class="custom-label nome-label">NOME</label>
        <input type="text" class="form-control">
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn-votar">VOTAR</button>
      </div>
    </form>
  </div>
  {% endif %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
