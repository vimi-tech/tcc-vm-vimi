<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FeiraScore</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Russo One', sans-serif;
    }

    body{

      min-height: 100vh;

      background:
      linear-gradient(rgba(60,0,0,0.50), rgba(60,0,0,0.50)),
      url("background-login.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;

    }

    /* CARD LOGIN */
    .login-card{

      width: 420px;

      padding: 35px;

      border-radius: 30px;

      background: rgba(255,255,255,0.12);

      border: 1px solid rgba(255,255,255,0.20);

      backdrop-filter: blur(8px);

      box-shadow: 0 8px 25px rgba(0,0,0,0.35);

    }

    /* TITULO */
    .login-title{

      color: white;

      text-align: center;

      font-size: 18px;

      line-height: 1.7;

      text-transform: uppercase;

      margin-bottom: 35px;

      letter-spacing: 1px;

    }

    /* LABELS */
    .custom-label{

      color: white;

      font-size: 18px;

      margin-bottom: 10px;

      text-transform: uppercase;

    }

    .nome-label{

      color: white;

      font-size: 16px;

      text-transform: lowercase;

    }

    /* INPUTS */
    .form-control{

      height: 48px;

      border: none;

      border-radius: 6px;

      background: rgba(255,255,255,0.95);

      font-size: 14px;

      padding-left: 15px;

    }

    .form-control:focus{

      box-shadow: none;

      border: 2px solid white;

    }

    /* TEXTO CONFIRMAR */
    .confirmar-text{

      color: white;

      text-align: right;

      font-size: 11px;

      margin-top: 8px;

      letter-spacing: 1px;

    }

    /* BOTÃO */
    .btn-votar{

      width: 110px;

      height: 42px;

      border: none;

      border-radius: 10px;

      background: linear-gradient(to right, #d9d9d9, #ffffff);

      color: #7a0000;

      font-size: 18px;

      transition: 0.3s;

    }

    .btn-votar:hover{

      transform: scale(1.05);

    }

    /* RESPONSIVO */
    @media(max-width: 500px){

      .login-card{

        width: 90%;
        padding: 25px;

      }

      .login-title{

        font-size: 15px;

      }

    }

  </style>

</head>

<body>

  <div class="login-card">

    <h1 class="login-title">
      PARA VOTAR, É NECESSÁRIO QUE VOCÊ
INSIRA SEU NÚMERO DE TELEFONE
    </h1>

    <form>

      <!-- TELEFONE -->
      <div class="mb-4">

        <input type="tel"
          class="form-control"
          placeholder="(16) XXXXX-XXXX">

        <div class="confirmar-text">
          CONFIRMAR NÚMERO
        </div>

      </div>

      <!-- CODIGO -->
      <div class="mb-4">

        <label class="form-label custom-label">
          CÓDIGO DE CONFIRMAÇÃO
        </label>

        <input type="text"
          class="form-control">

      </div>

      <!-- NOME -->
      <div class="mb-4">

        <label class="form-label custom-label">
          NOME
        </label>

        <input type="text"
          class="form-control">

      </div>

      <!-- BOTÃO -->
      <div class="text-center">

        <button type="submit" class="btn-votar">
          VOTAR
        </button>

      </div>

    </form>

  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
