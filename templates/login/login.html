<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FeiraScore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Russo One', sans-serif;
    }

    body {
      min-height: 100vh;
      /* Define um fundo vermelho escuro padrão E carrega a imagem por cima */
      background-color: #3c0000; 
      background-image: url("/static/fundo.png"); 
      
      /* IMPORTANTE: Se sua imagem estiver dentro de uma pasta chamada 'static', 
         mude a linha de cima para: background-image: url("static/fundo.png"); */

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CARD LOGIN (Estilo Glassmorphism translúcido idêntico à imagem) */
    .login-card {
      width: 450px;
      padding: 40px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    /* TÍTULO */
    .login-title {
      color: white;
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      text-transform: uppercase;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    /* LABELS */
    .custom-label {
      color: white;
      font-size: 14px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nome-label {
      text-transform: lowercase;
    }

    /* INPUTS */
    .form-control {
      height: 48px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.90);
      font-size: 15px;
      padding-left: 15px;
      color: #333;
    }

    .form-control:focus {
      box-shadow: none;
      background: #ffffff;
    }

    /* TEXTO CONFIRMAR */
    .confirmar-text {
      color: white;
      text-align: right;
      font-size: 11px;
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* BOTÃO */
    .btn-votar {
      width: 120px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to bottom, #e6e6e6, #ffffff);
      color: #5a0000;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s ease-in-out;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn-votar:hover {
      transform: scale(1.03);
      background: #ffffff;
    }

    /* RESPONSIVO */
    @media(max-width: 500px) {
      .login-card {
        width: 90%;
        padding: 25px;
      }
      .login-title {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h1 class="login-title">
      Para votar, é necessário que você insira seu número de telefone
    </h1>

    <form>
      <div class="mb-4">
        <input type="tel" class="form-control" placeholder="(16) XXXXX-XXXX">
        <div class="confirmar-text">
          Confirmar Número
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label custom-label">
          Código de Confirmação
        </label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-4">
        <label class="form-label custom-label nome-label">
          NOME
        </label>
        <input type="text" class="form-control">
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn-votar">
          VOTAR
        </button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
