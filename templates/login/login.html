<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>FeiraScore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

  <div class="form-wrapper">
    <div class="login-card">

      <h1 class="login-title">
        Para votar, é necessário que você insira seu número de telefone
      </h1>

      <form id="voteForm" action="#" method="POST">

        <div class="mb-4">
          <input type="tel" class="form-control" placeholder="(16) XXXXX-XXXX" required>
          <div class="confirmar-text">
            Confirmar Número
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label custom-label">
            Código de Confirmação
          </label>
          <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label custom-label">
            Nome
          </label>
          <input type="text" class="form-control" required>
        </div>

      </form>

    </div>

    <button type="submit" form="voteForm" class="btn-votar">
      VOTAR
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
